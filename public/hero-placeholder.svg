<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Hero automotriz premium</title>
  <desc id="desc">Visual de portada con silueta deportiva, iluminación roja y atmósfera oscura.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17171a"/>
      <stop offset="58%" stop-color="#101013"/>
      <stop offset="100%" stop-color="#070708"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="0.22" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#b30000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#b30000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorLight" cx="0.55" cy="0.95" r="0.55">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="carPaint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26272b"/>
      <stop offset="45%" stop-color="#121317"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fa0bf" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#202a36" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#redGlow)"/>

